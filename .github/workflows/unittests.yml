name: unit tests

# Runs the headless admin unit tests (tests/anonmail) on every pull request and
# on pushes to master. These exercise the Flask-Admin models/views/API against
# an in-memory SQLite database and the memory:// rate limiter, so no mail stack
# or external services are needed -- unlike the docker-compose integration tests
# in build_test_deploy.yml, which do not cover this layer.

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  anonmail:
    name: admin unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential libmariadb-dev libffi-dev libssl-dev pkg-config
      - name: Install python dependencies
        run: |
          # podop and socrate are vendored (file:///app/libs/...) and are made
          # importable via PYTHONPATH below instead of being pip-installed.
          grep -v 'file:///app/libs' core/base/requirements-prod.txt > /tmp/requirements.txt
          pip install --no-cache-dir \
            -r /tmp/requirements.txt -r tests/requirements.txt pytest 'setuptools<81'
      - name: Run tests/anonmail
        env:
          PYTHONPATH: core/base/libs/podop:core/base/libs/socrate
        run: pytest -v tests/anonmail
